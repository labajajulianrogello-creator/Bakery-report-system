<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bakery Daily Report</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>🍞 Bakery Daily Report</h1>
<p id="lastSaved">Last saved: Never</p>

<hr>

<h2>Morning Setup (Bread Stock)</h2>

<div class="form-row">
<input id="breadType" placeholder="Bread Type">
<input id="pieces" type="number" placeholder="Pieces">
<input id="price" type="number" placeholder="Price">
<input id="kilos" type="number" placeholder="Kilos">
<input id="purchase" type="number" placeholder="Pull Out">
<input id="lop" type="number" placeholder="L.O.P">
<button onclick="addBreadStock()">Add Bread Stock</button>
</div>

<hr>

<h2>Customer Purchase</h2>

<div class="form-row">
<select id="saleBread"></select>
<input id="saleQty" type="number" placeholder="Quantity">
<button onclick="recordSale()">Record Sale</button>
</div>

<hr>

<div class="button-row">
<button onclick="finishDay()">Finish Day / Download Report</button>
<button onclick="printReport()">Print Report</button>
</div>

<hr>

<h2>Today's Report</h2>

<div class="table-container">
<table id="reportTable">
<thead>
<tr>
<th>Bread</th>
<th>Kilos</th>
<th>Price</th>
<th>Pieces</th>
<th>Pieces Amount</th>
<th>L.O.P</th>
<th>L.O.P Amount</th>
<th>Pull Out</th>
<th>Pull Out Amount</th>
<th>L.O.T</th> 
<th>L.O.T Amount</th>
<th>Sold</th>
<th>Sold Amount</th>
<th>Action</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
